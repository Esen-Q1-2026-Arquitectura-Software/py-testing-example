{% extends "base.html" %}

{% block title %}Calculator{% endblock %}

{% block content %}
<h1>Calculator</h1>
<p class="subtitle">Powered by Flask &amp; FastAPI</p>

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form method="POST" action="/calculate">
    <label for="a">First number</label>
    <input
        type="number"
        id="a"
        name="a"
        step="any"
        placeholder="e.g. 12"
        value="{{ a if a is defined else '' }}"
        required
    />

    <label for="b">Second number</label>
    <input
        type="number"
        id="b"
        name="b"
        step="any"
        placeholder="e.g. 8"
        value="{{ b if b is defined else '' }}"
        required
    />

    <div class="btn-group">
        <button type="submit" name="operation" value="add" class="btn btn-add">
            Add &nbsp; a + b
        </button>
        <button type="submit" name="operation" value="multiply" class="btn btn-multiply">
            Multiply &nbsp; a × b
        </button>
    </div>
</form>
{% endblock %}
